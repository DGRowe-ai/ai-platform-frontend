<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>
    <h2>Create Account</h2>

    <input id="email" type="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <input id="business_name" type="text" placeholder="Business Name"><br>

    <button id="register-btn">Register</button>
    <p id="error" style="color:#c00"></p>

    <script type="module">
        import { apiJson } from "./api.js";

        const errorEl = document.getElementById("error");

        document.getElementById("register-btn").onclick = async () => {
            errorEl.textContent = "";
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const business_name = document.getElementById("business_name").value.trim();

            try {
                await apiJson("/signup", {
                    method: "POST",
                    auth: false,
                    body: { email, password, business_name },
                });
                alert("Account created! Now log in.");
                window.location.href = "login.html";
            } catch (err) {
                errorEl.textContent = err.message || "Registration failed.";
            }
        };
    </script>
</body>
</html>
