<!DOCTYPE html>
<html>
<head>
    <title>Business Chatbot</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: auto; padding: 20px; }
        #messages { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: scroll; margin-bottom: 10px; }
        .user { color: #0066ff; margin: 5px 0; }
        .bot { color: #009933; margin: 5px 0; }
        input { padding: 10px; width: 75%; }
        button { padding: 10px; }
    </style>
</head>
<body>

<h2 id="businessName">Chatbot</h2>

<div id="messages"></div>

<input id="msg" placeholder="Type your message...">
<button id="send-btn" type="button">Send</button>

<script type="module">
    import { apiJson } from "./api.js";

    const urlParams = new URLSearchParams(window.location.search);
    const businessId = urlParams.get("b");

    if (!businessId) {
        alert("Missing business ID in URL. Example: chat.html?b=sunrise_dental");
    }

    function addMessage(role, text) {
        const div = document.getElementById("messages");
        const p = document.createElement("p");
        p.className = role;
        p.textContent = text;
        div.appendChild(p);
        div.scrollTop = div.scrollHeight;
    }

    async function sendMessage() {
        const text = document.getElementById("msg").value.trim();
        if (!text || !businessId) return;

        document.getElementById("msg").value = "";
        addMessage("user", text);

        try {
            const data = await apiJson("/business/chat", {
                method: "POST",
                auth: false,
                body: { business_id: businessId, message: text },
            });
            addMessage("bot", data.response);
        } catch (err) {
            addMessage("bot", "Sorry, something went wrong.");
            console.error(err);
        }
    }

    document.getElementById("send-btn").addEventListener("click", sendMessage);
    document.getElementById("msg").addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
    });
</script>

</body>
</html>
