<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Chatbot</title>
    <link rel="stylesheet" href="css/responsive-base.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0 auto;
            max-width: 600px;
            overflow-x: hidden;
            padding: 20px;
            width: 100%;
        }

        #messages {
            border: 1px solid #ccc;
            border-radius: 10px;
            height: min(50vh, 400px);
            margin-bottom: 12px;
            overflow-y: auto;
            padding: 12px;
        }

        .user { color: #0066ff; margin: 5px 0; word-break: break-word; }
        .bot { color: #009933; margin: 5px 0; word-break: break-word; }

        .chat-input-row {
            display: grid;
            gap: 10px;
            grid-template-columns: minmax(0, 1fr) auto;
        }

        input {
            font-size: 16px;
            min-height: 44px;
            padding: 10px 12px;
            width: 100%;
        }

        button {
            background: #0f9488;
            border: 0;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            min-height: 44px;
            padding: 10px 16px;
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            .chat-input-row {
                grid-template-columns: 1fr;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<h2 id="businessName">Chatbot</h2>

<div id="messages"></div>

<div class="chat-input-row">
    <input id="msg" placeholder="Type your message...">
    <button type="button" onclick="sendMessage()">Send</button>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const businessId = urlParams.get("b");

    if (!businessId) {
        alert("Missing business ID in URL. Example: chat.html?b=sunrise_dental");
    }

    async function sendMessage() {
        const text = document.getElementById("msg").value.trim();
        if (!text) return;

        document.getElementById("msg").value = "";
        addMessage("user", text);

        const res = await fetch("https://ai-platform-backend-ulqs.onrender.com/business/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                business_id: businessId,
                message: text
            })
        });

        const data = await res.json();
        addMessage("bot", data.response);
    }

    function addMessage(role, text) {
        const div = document.getElementById("messages");
        const p = document.createElement("p");
        p.className = role;
        p.textContent = text;
        div.appendChild(p);
        div.scrollTop = div.scrollHeight;
    }
</script>

</body>
</html>
