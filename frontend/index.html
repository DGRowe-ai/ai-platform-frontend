<body>

    <button id="admin-btn" style="display:none; position:fixed; top:20px; right:20px; z-index:999999;">
        Admin Panel
    </button>

    <!-- Removed the entire chat-container block so the top-left bar disappears -->

    <iframe id="loki-widget" src="widget-frame.html" style="
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 380px;
        height: 600px;
        border: none;
        z-index: 999999;
    "></iframe>

    <script src="/script.js"></script>

    <script>
        const role = localStorage.getItem("role");

        if (role === "admin") {
            document.getElementById("admin-btn").style.display = "inline-block";
        }

        document.getElementById("admin-btn").addEventListener("click", () => {
            window.location.href = "../admin.html";
        });
    </script>

</body>
</html>
