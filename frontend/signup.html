<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 40px;
        }
        .box {
            width: 350px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #0078ff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .error {
            color: #c00;
            margin-top: 12px;
            font-size: 14px;
            min-height: 1.2em;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Create Your Account</h2>

    <input id="email" type="email" placeholder="Email" autocomplete="email">
    <input id="password" type="password" placeholder="Password" autocomplete="new-password">
    <input id="business" type="text" placeholder="Business Name">

    <button id="signup-btn" type="button">Sign Up</button>
    <p id="error" class="error" role="alert"></p>
</div>

<script type="module">
import { apiJson } from "./api.js";

const errorEl = document.getElementById("error");
const signupBtn = document.getElementById("signup-btn");

async function signup() {
  errorEl.textContent = "";

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const business = document.getElementById("business").value.trim();

  if (!email || !password || !business) {
    errorEl.textContent = "Please fill in all fields.";
    return;
  }

  signupBtn.disabled = true;
  signupBtn.textContent = "Creating account...";

  try {
    await apiJson("/signup", {
      method: "POST",
      auth: false,
      body: { email, password, business_name: business },
    });
    alert("Signup successful! Now log in.");
    window.location.href = "login.html";
  } catch (err) {
    console.error("Signup failed:", err);
    errorEl.textContent = err.message || "Signup failed. Please try again.";
  } finally {
    signupBtn.disabled = false;
    signupBtn.textContent = "Sign Up";
  }
}

signupBtn.addEventListener("click", signup);
</script>

</body>
</html>
