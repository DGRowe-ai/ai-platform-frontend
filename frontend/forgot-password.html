<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Rowe AI</title>
  <link rel="stylesheet" href="css/responsive-base.css">
  <link rel="stylesheet" href="css/auth-pages.css">
</head>
<body class="auth-page">
  <section class="auth-card">
    <div class="auth-header">
      <h1>Forgot Password</h1>
      <p>Enter your email and we will send you a secure reset link.</p>
    </div>

    <div class="auth-body">
      <div class="auth-message info hidden" id="page-message"></div>

      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@company.com" autocomplete="email">

      <button id="submit-btn" type="button">Send Reset Link</button>
      <a class="auth-link" href="login.html">Back to login</a>
    </div>
  </section>

  <script>
    const API_URL = "https://ai-platform-backend-ulqs.onrender.com";

    const els = {
      email: document.getElementById("email"),
      submitBtn: document.getElementById("submit-btn"),
      pageMessage: document.getElementById("page-message"),
    };

    function showMessage(text, type = "info") {
      els.pageMessage.textContent = text;
      els.pageMessage.className = `auth-message ${type}`;
      els.pageMessage.classList.remove("hidden");
    }

    (function showQueryMessage() {
      const params = new URLSearchParams(window.location.search);
      const message = params.get("message");
      if (message) {
        showMessage(message, "error");
      }
    })();

    async function requestReset() {
      const email = els.email.value.trim();
      if (!email) {
        showMessage("Please enter your email address.", "error");
        return;
      }

      els.submitBtn.disabled = true;
      showMessage("Sending reset link...", "info");

      try {
        const response = await fetch(`${API_URL}/api/auth/request-password-reset`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.detail || "Unable to send reset link.");
        }

        showMessage(
          data.message || "If this email exists, a reset link has been sent.",
          "success",
        );
      } catch (err) {
        console.error("[Forgot Password]", err);
        showMessage(err.message || "Unable to send reset link. Please try again.", "error");
      } finally {
        els.submitBtn.disabled = false;
      }
    }

    els.submitBtn.addEventListener("click", requestReset);
    els.email.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        requestReset();
      }
    });
  </script>
</body>
</html>
