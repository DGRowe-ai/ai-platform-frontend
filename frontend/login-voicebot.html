<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voicebot Login | Rowe AI</title>
  <link rel="stylesheet" href="css/responsive-base.css">
  <link rel="stylesheet" href="css/auth-pages.css">
</head>
<body class="auth-page">

<section class="auth-card login-card">
  <div class="auth-header login-header">
    <h2>Voicebot Login</h2>
    <p>Sign in to manage your AI phone receptionist dashboard.</p>
  </div>

  <div class="auth-body login-body">
    <div class="auth-message success hidden" id="reset-success-message">
      Your password has been updated. You can log in now.
    </div>
    <div class="auth-message error hidden" id="login-error"></div>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@company.com" autocomplete="email">

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Password" autocomplete="current-password">

    <button id="login-btn" type="button">Login to Voicebot Dashboard</button>
    <a class="auth-link" href="login-chatbot.html">Chatbot login</a>
    <a class="auth-link" href="forgot-password.html?return=login-voicebot.html">Forgot Password?</a>
    <a class="auth-link" href="billing.html">Create an account</a>
    <a class="auth-link" href="admin/login.html">Admin login</a>
  </div>
</section>

<script src="js/app-config.js"></script>
<script src="js/referral-utils.js"></script>
<script src="js/product-login.js"></script>
<script>
  RoweReferral.captureReferralFromUrl();
  RoweReferral.applyReferralToLinks('a[href="billing.html"]');
  RoweProductLogin.init({
    product: "voicebot",
    dashboardUrl: "voicebot-dashboard.html",
    alternateProductLabel: "chatbot login page",
    loginButtonLabel: "Login to Voicebot Dashboard",
  });
</script>

</body>
</html>
