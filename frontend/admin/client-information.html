<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Information | Admin Dashboard</title>
  <link rel="stylesheet" href="../css/responsive-base.css">
  <link rel="stylesheet" href="admin-dashboard.css">
</head>
<body>
  <header>
    <div class="header-brand">
      <div class="brand-logo-wrap">
        <img class="brand-logo" src="../images/loki/Logo/rowe-ai-logo.png" alt="Rowe AI">
      </div>
      <div>
        <h1>Client Information</h1>
        <p>Review each client’s plan tier, business phone, and call forwarding settings.</p>
      </div>
    </div>
    <nav class="admin-nav" aria-label="Admin sections">
      <a href="businesses.html">Client Dashboard</a>
      <a href="business-directory.html">Business Directory</a>
      <a class="active" href="client-information.html">Client Information</a>
      <a href="accounting.html">Accounting</a>
    </nav>
  </header>

  <main>
    <div class="topbar">
      <div>
        <div class="status" id="page-status">Loading client information...</div>
      </div>
      <div class="button-row">
        <button class="secondary" id="refresh-btn" type="button">Refresh</button>
        <button class="secondary" id="logout-btn" type="button">Log out</button>
      </div>
    </div>

    <section class="card span-12">
      <div class="toolbar">
        <div>
          <h2>All Clients</h2>
          <div class="muted" id="client-count">0 clients</div>
        </div>
      </div>

      <div class="filters">
        <div>
          <label for="search-input">Search clients</label>
          <input
            id="search-input"
            type="search"
            placeholder="Search by business, email, tier, or phone"
          >
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Business</th>
              <th>Owner Email</th>
              <th>Tier</th>
              <th>Forwarding Enabled</th>
              <th>Forwarding Number</th>
              <th>Business Phone</th>
            </tr>
          </thead>
          <tbody id="client-table-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="client-information.js?v=20260715-client-info-1"></script>
</body>
</html>
