<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="admin-dashboard.css">
</head>
<body>
  <header>
    <div class="header-brand">
      <div class="brand-logo-wrap">
        <img class="brand-logo" src="../images/loki/Logo/rowe-ai-logo.png" alt="Rowe AI">
      </div>
      <div>
        <h1>Admin Client Dashboard</h1>
        <p>One central place to view every client business, monitor activity, and track payment status.</p>
      </div>
    </div>
  </header>

  <main>
    <div class="topbar">
      <div>
        <div class="status" id="page-status">Loading admin dashboard...</div>
      </div>
      <div class="button-row">
        <button class="secondary" id="refresh-btn" type="button">Refresh</button>
        <button class="secondary" id="logout-btn" type="button">Log out</button>
      </div>
    </div>

    <section class="card span-12">
      <div class="toolbar">
        <h2>Platform Analytics</h2>
        <span class="muted">Live admin summary</span>
      </div>
      <div class="stats-grid" id="analytics-cards"></div>
    </section>

    <section class="card span-12">
      <div class="toolbar">
        <div>
          <h2>Business Management</h2>
          <div class="muted" id="business-count">0 businesses</div>
        </div>
        <button class="warning" id="overdue-filter-btn" type="button">View Overdue Businesses</button>
      </div>

      <div class="filters">
        <div>
          <label for="search-input">Search businesses</label>
          <input id="search-input" type="search" placeholder="Search by business or owner email">
        </div>
        <div>
          <label for="status-filter">Status</label>
          <select id="status-filter">
            <option value="all">All statuses</option>
            <option value="active">Active</option>
            <option value="disabled">Disabled</option>
          </select>
        </div>
        <div>
          <label for="payment-filter">Payment</label>
          <select id="payment-filter">
            <option value="all">All payments</option>
            <option value="paid">Paid / up to date</option>
            <option value="overdue">Overdue</option>
            <option value="none">No payments recorded</option>
          </select>
        </div>
        <div>
          <label>&nbsp;</label>
          <button class="secondary" id="clear-filters-btn" type="button">Clear Filters</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Business</th>
              <th>Owner Email</th>
              <th>Created</th>
              <th>Status</th>
              <th>Payment</th>
              <th>Renewal</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="business-table-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h2 id="modal-title">Confirm action</h2>
      <div id="modal-body"></div>
      <div class="modal-actions" id="modal-actions"></div>
    </div>
  </div>

  <script src="businesses.js?v=20260611-admin-delete-client"></script>
</body>
</html>
