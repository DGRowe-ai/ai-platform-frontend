<script>
    const token = localStorage.getItem("token");

    fetch("https://ai-platform-backend-ulqs.onrender.com/admin/businesses", {
        headers: { 
            "Authorization": "Bearer " + token 
        }
    })
    .then(res => {
        if (!res.ok) {
            console.error("Failed to load businesses");
            return [];
        }
        return res.json();
    })
    .then(data => {
        const tbody = document.querySelector("#bizTable tbody");
        tbody.innerHTML = "";

        data.forEach(b => {
            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${b.id}</td>
                <td>${b.name}</td>
                <td>${b.owner_email}</td>
                <td>${b.subscription_active ? 'Active' : 'Inactive'}</td>
                <td>${b.created_at || '—'}</td>
                <td>${b.last_payment || '—'}</td>
            `;

            tbody.appendChild(row);
        });
    })
    .catch(err => console.error("Error:", err));
</script>
