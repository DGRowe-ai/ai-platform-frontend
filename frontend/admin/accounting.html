<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accounting | Admin Dashboard</title>
  <link rel="stylesheet" href="../css/responsive-base.css">
  <link rel="stylesheet" href="admin-dashboard.css">
</head>
<body>
  <header>
    <div class="header-brand">
      <div class="brand-logo-wrap">
        <img class="brand-logo" src="../images/loki/Logo/rowe-ai-logo.png" alt="Rowe AI">
      </div>
      <div>
        <h1>Accounting</h1>
        <p>Review client payment logs and billing activity pulled from each business payment folder.</p>
      </div>
    </div>
    <nav class="admin-nav" aria-label="Admin sections">
      <a href="businesses.html">Client Dashboard</a>
      <a href="business-directory.html">Business Directory</a>
      <a href="client-information.html">Client Information</a>
      <a class="active" href="accounting.html">Accounting</a>
    </nav>
  </header>

  <main>
    <div class="topbar">
      <div>
        <div class="status" id="page-status">Loading accounting data...</div>
      </div>
      <div class="button-row">
        <button class="secondary" id="refresh-btn" type="button">Refresh</button>
        <button class="secondary" id="logout-btn" type="button">Log out</button>
      </div>
    </div>

    <section class="card span-12">
      <div class="toolbar">
        <div>
          <h2>Client Businesses</h2>
          <div class="muted" id="business-count">0 businesses</div>
        </div>
      </div>

      <div class="filters">
        <div>
          <label for="search-input">Search businesses</label>
          <input id="search-input" type="search" placeholder="Search by business or owner email">
        </div>
      </div>

      <div class="business-link-list" id="business-list"></div>
    </section>
  </main>

  <script src="accounting.js?v=20260619-accounting-1"></script>
</body>
</html>
