<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Rowe AI</title>
  <link rel="stylesheet" href="css/responsive-base.css">
  <link rel="stylesheet" href="css/auth-pages.css">
</head>
<body class="auth-page">
  <section class="auth-card">
    <div class="auth-header">
      <h1>Reset Password</h1>
      <p>Choose a new password for your Rowe AI account.</p>
    </div>

    <div class="auth-body">
      <div class="auth-message error hidden" id="page-message"></div>

      <form id="reset-form" class="hidden">
        <label for="new-password">New password</label>
        <input id="new-password" type="password" autocomplete="new-password" minlength="8" required>

        <label for="confirm-password">Confirm new password</label>
        <input id="confirm-password" type="password" autocomplete="new-password" minlength="8" required>

        <button id="submit-btn" type="submit">Save New Password</button>
      </form>

      <a class="auth-link" href="forgot-password.html">Request a new reset link</a>
      <a class="auth-link" href="login.html">Back to login</a>
    </div>
  </section>

  <script>
    const API_URL = "https://ai-platform-backend-ulqs.onrender.com";

    const els = {
      form: document.getElementById("reset-form"),
      newPassword: document.getElementById("new-password"),
      confirmPassword: document.getElementById("confirm-password"),
      submitBtn: document.getElementById("submit-btn"),
      pageMessage: document.getElementById("page-message"),
    };

    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    function redirectToForgot(message) {
      const url = new URL("forgot-password.html", window.location.href);
      url.searchParams.set("message", message);
      window.location.replace(url.toString());
    }

    function showMessage(text, type = "error") {
      els.pageMessage.textContent = text;
      els.pageMessage.className = `auth-message ${type}`;
      els.pageMessage.classList.remove("hidden");
    }

    async function validateToken() {
      if (!token) {
        redirectToForgot("Your reset link is invalid or expired. Please request a new one.");
        return;
      }

      try {
        const response = await fetch(`${API_URL}/api/auth/validate-reset-token`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.valid) {
          redirectToForgot("Your reset link is invalid or expired. Please request a new one.");
          return;
        }

        els.form.classList.remove("hidden");
        els.newPassword.focus();
      } catch (err) {
        console.error("[Reset Password] token validation failed", err);
        redirectToForgot("Your reset link is invalid or expired. Please request a new one.");
      }
    }

    els.form.addEventListener("submit", async event => {
      event.preventDefault();

      const newPassword = els.newPassword.value;
      const confirmPassword = els.confirmPassword.value;

      if (newPassword.length < 8) {
        showMessage("Password must be at least 8 characters.", "error");
        return;
      }

      if (newPassword !== confirmPassword) {
        showMessage("Passwords do not match.", "error");
        return;
      }

      els.submitBtn.disabled = true;

      try {
        const response = await fetch(`${API_URL}/api/auth/reset-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            token,
            newPassword,
          }),
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          if (response.status === 400) {
            redirectToForgot("Your reset link is invalid or expired. Please request a new one.");
            return;
          }
          throw new Error(data.detail || "Unable to reset password.");
        }

        const loginUrl = new URL("login.html", window.location.href);
        loginUrl.searchParams.set("reset", "success");
        window.location.href = loginUrl.toString();
      } catch (err) {
        console.error("[Reset Password]", err);
        showMessage(err.message || "Unable to reset password. Please try again.", "error");
        els.submitBtn.disabled = false;
      }
    });

    validateToken();
  </script>
</body>
</html>
