<!DOCTYPE html>
<html>
<head>
    <title>Business Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="dashboard">
    <h2>Your Business</h2>

    <div class="field">
        <label>Business Name:</label>
        <span id="biz-name"></span>
    </div>

    <div class="field">
        <label>Folder Name:</label>
        <span id="biz-folder"></span>
    </div>

    <div class="field">
        <label>Owner Email:</label>
        <span id="biz-owner"></span>
    </div>

    <div class="field">
        <label>Subscription Status:</label>
        <span id="biz-sub"></span>
    </div>

    <div class="field">
        <label>Created At:</label>
        <span id="biz-created"></span>
    </div>

    <div class="field">
        <label>Last Payment:</label>
        <span id="biz-payment"></span>
    </div>
</div>

<script type="module" src="dashboard.js"></script>
</body>
</html>
