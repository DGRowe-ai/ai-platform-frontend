<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 40px;
        }
        .box {
            width: 350px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #0078ff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
        .admin-link {
            display: block;
            margin-top: 16px;
            text-align: center;
            color: #0f766e;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <a class="admin-link" href="register.html">Create an account</a>
    <a class="admin-link" href="admin/login.html">Admin login</a>
</div>

<script>
const API_URL = "https://ai-platform-backend-ulqs.onrender.com";

function parseJwtPayload(token) {
    if (!token || !token.includes(".")) {
        return {};
    }

    try {
        const payload = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
        const paddedPayload = payload.padEnd(payload.length + (4 - payload.length % 4) % 4, "=");
        return JSON.parse(atob(paddedPayload));
    } catch (err) {
        console.warn("Unable to parse login token payload", err);
        return {};
    }
}

function getUserRole(data, tokenPayload) {
    const role =
        data.role ||
        data.user_role ||
        data.account_role ||
        data.user?.role ||
        data.user?.user_role ||
        data.current_user?.role ||
        tokenPayload.role ||
        tokenPayload.user_role ||
        "";

    return String(role).toLowerCase();
}

function isAdminUser(data, tokenPayload) {
    return Boolean(
        data.is_admin ||
        data.is_platform_admin ||
        data.user?.is_admin ||
        data.user?.is_platform_admin ||
        data.current_user?.is_admin ||
        data.current_user?.is_platform_admin ||
        tokenPayload.is_admin ||
        tokenPayload.is_platform_admin
    );
}

async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const res = await fetch(`${API_URL}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const data = await res.json();

        if (!res.ok) {
            alert(data.detail || "Login failed");
            return;
        }

        const token = data.access_token || data.token;
        if (!token) {
            alert("Login response did not include an access token.");
            return;
        }

        const tokenPayload = parseJwtPayload(token);
        const role = getUserRole(data, tokenPayload);

        localStorage.setItem("token", token);
        localStorage.setItem("access_token", token);
        localStorage.setItem("user_role", role);
        localStorage.setItem(
            "is_platform_admin",
            isAdminUser(data, tokenPayload) ? "1" : "0"
        );

        if (data.user_id) {
            localStorage.setItem("user_id", data.user_id);
        }

        if (data.businesses) {
            localStorage.setItem("businesses", JSON.stringify(data.businesses));
        }

        // Regular login always opens the client dashboard.
        // Platform admins can switch to the admin panel from there.
        window.location.href = "client-dashboard.html";
    } catch (err) {
        console.error("Login error:", err);
        alert("Unable to login. Please try again.");
    }
}
</script>

</body>
</html>
