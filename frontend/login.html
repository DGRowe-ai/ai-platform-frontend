<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Rowe AI</title>
    <link rel="stylesheet" href="css/responsive-base.css">
    <link rel="stylesheet" href="css/auth-pages.css">
</head>
<body class="auth-page">

<section class="auth-card login-card">
    <div class="auth-header login-header">
        <h2>Client Login</h2>
        <p>Sign in to manage your chatbot dashboard.</p>
    </div>

    <div class="auth-body login-body">
        <div class="auth-message success hidden" id="reset-success-message">
            Your password has been updated. You can log in now.
        </div>

        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@company.com" autocomplete="email">

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Password" autocomplete="current-password">

        <button type="button" onclick="login()">Login</button>
        <a class="auth-link" href="forgot-password.html">Forgot Password?</a>
        <a class="auth-link" href="billing.html">Create an account</a>
        <a class="auth-link" href="admin/login.html">Admin login</a>
    </div>
</section>

<script src="js/app-config.js"></script>
<script>
const API_URL = window.RoweAppConfig?.API_URL || "https://ai-platform-backend-ulqs.onrender.com";

(function showResetSuccess() {
    const params = new URLSearchParams(window.location.search);
    if (params.get("reset") === "success") {
        document.getElementById("reset-success-message").classList.remove("hidden");
    }
})();

function parseJwtPayload(token) {
    if (!token || !token.includes(".")) {
        return {};
    }

    try {
        const payload = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
        const paddedPayload = payload.padEnd(payload.length + (4 - payload.length % 4) % 4, "=");
        return JSON.parse(atob(paddedPayload));
    } catch (err) {
        console.warn("Unable to parse login token payload", err);
        return {};
    }
}

function getUserRole(data, tokenPayload) {
    const role =
        data.role ||
        data.user_role ||
        data.account_role ||
        data.user?.role ||
        data.user?.user_role ||
        data.current_user?.role ||
        tokenPayload.role ||
        tokenPayload.user_role ||
        "";

    return String(role).toLowerCase();
}

function isAdminUser(data, tokenPayload) {
    return Boolean(
        data.is_admin ||
        data.is_platform_admin ||
        data.user?.is_admin ||
        data.user?.is_platform_admin ||
        data.current_user?.is_admin ||
        data.current_user?.is_platform_admin ||
        tokenPayload.is_admin ||
        tokenPayload.is_platform_admin
    );
}

async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const res = await fetch(`${API_URL}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const data = await res.json();

        if (!res.ok) {
            alert(data.detail || "Login failed");
            return;
        }

        const token = data.access_token || data.token;
        if (!token) {
            alert("Login response did not include an access token.");
            return;
        }

        const tokenPayload = parseJwtPayload(token);
        const role = getUserRole(data, tokenPayload);

        localStorage.setItem("token", token);
        localStorage.setItem("access_token", token);
        localStorage.setItem("user_role", role);
        localStorage.setItem(
            "is_platform_admin",
            isAdminUser(data, tokenPayload) ? "1" : "0"
        );

        if (data.user_id) {
            localStorage.setItem("user_id", data.user_id);
        }

        if (data.businesses) {
            localStorage.setItem("businesses", JSON.stringify(data.businesses));
        }

        if (data.plan_type) {
            localStorage.setItem("plan_type", data.plan_type);
        }
        if (typeof data.has_voicebot !== "undefined") {
            localStorage.setItem("has_voicebot", data.has_voicebot ? "1" : "0");
        }
        if (typeof data.has_chatbot !== "undefined") {
            localStorage.setItem("has_chatbot", data.has_chatbot ? "1" : "0");
        }

        if (data.plan_type === "voicebot") {
            window.location.href = "voicebot-dashboard.html";
            return;
        }

        window.location.href = "client-dashboard.html";
    } catch (err) {
        console.error("Login error:", err);
        alert("Unable to login. Please try again.");
    }
}
</script>

</body>
</html>
