<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Rowe AI</title>
    <link rel="stylesheet" href="css/responsive-base.css">
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #172033;
            --muted: #667085;
            --border: #d9e2ef;
            --primary: #0f9488;
            --primary-dark: #0f766e;
            --shadow: 0 18px 45px rgba(15, 118, 110, 0.18);
        }

        body {
            align-items: center;
            background:
                radial-gradient(circle at top right, rgba(153, 246, 228, 0.34), transparent 34%),
                linear-gradient(135deg, #ecfeff 0%, var(--bg) 58%, #ccfbf1 100%);
            color: var(--text);
            display: flex;
            font-family: Arial, sans-serif;
            justify-content: center;
            min-height: 100vh;
            padding: 24px 16px;
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            box-shadow: var(--shadow);
            margin: 0 auto;
            max-width: 400px;
            overflow: hidden;
            width: 100%;
        }

        .login-header {
            background: linear-gradient(135deg, #0f766e 0%, #0f9488 55%, #115e59 100%);
            color: #ffffff;
            padding: 28px 24px;
        }

        .login-header h2 {
            font-size: clamp(24px, 5vw, 31px);
            margin: 0 0 8px;
        }

        .login-header p {
            color: #d7fffa;
            font-size: 14px;
            line-height: 1.45;
            margin: 0;
        }

        .login-body {
            padding: 24px;
        }

        label {
            color: var(--muted);
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin: 14px 0 6px;
        }

        input {
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font: inherit;
            padding: 12px;
            width: 100%;
        }

        button {
            background: var(--primary);
            border: 0;
            border-radius: 10px;
            color: #ffffff;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            margin-top: 18px;
            padding: 12px 14px;
            width: 100%;
        }

        button:hover {
            background: var(--primary-dark);
        }

        .admin-link {
            color: var(--primary-dark);
            display: block;
            font-size: 14px;
            margin-top: 16px;
            text-align: center;
            text-decoration: none;
        }

        .admin-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            body {
                padding: 16px 10px;
            }

            .login-body {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>

<section class="login-card">
    <div class="login-header">
        <h2>Client Login</h2>
        <p>Sign in to manage your chatbot dashboard.</p>
    </div>

    <div class="login-body">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@company.com" autocomplete="email">

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Password" autocomplete="current-password">

        <button type="button" onclick="login()">Login</button>
        <a class="admin-link" href="register.html">Create an account</a>
        <a class="admin-link" href="admin/login.html">Admin login</a>
    </div>
</section>

<script>
const API_URL = "https://ai-platform-backend-ulqs.onrender.com";

function parseJwtPayload(token) {
    if (!token || !token.includes(".")) {
        return {};
    }

    try {
        const payload = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
        const paddedPayload = payload.padEnd(payload.length + (4 - payload.length % 4) % 4, "=");
        return JSON.parse(atob(paddedPayload));
    } catch (err) {
        console.warn("Unable to parse login token payload", err);
        return {};
    }
}

function getUserRole(data, tokenPayload) {
    const role =
        data.role ||
        data.user_role ||
        data.account_role ||
        data.user?.role ||
        data.user?.user_role ||
        data.current_user?.role ||
        tokenPayload.role ||
        tokenPayload.user_role ||
        "";

    return String(role).toLowerCase();
}

function isAdminUser(data, tokenPayload) {
    return Boolean(
        data.is_admin ||
        data.is_platform_admin ||
        data.user?.is_admin ||
        data.user?.is_platform_admin ||
        data.current_user?.is_admin ||
        data.current_user?.is_platform_admin ||
        tokenPayload.is_admin ||
        tokenPayload.is_platform_admin
    );
}

async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const res = await fetch(`${API_URL}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const data = await res.json();

        if (!res.ok) {
            alert(data.detail || "Login failed");
            return;
        }

        const token = data.access_token || data.token;
        if (!token) {
            alert("Login response did not include an access token.");
            return;
        }

        const tokenPayload = parseJwtPayload(token);
        const role = getUserRole(data, tokenPayload);

        localStorage.setItem("token", token);
        localStorage.setItem("access_token", token);
        localStorage.setItem("user_role", role);
        localStorage.setItem(
            "is_platform_admin",
            isAdminUser(data, tokenPayload) ? "1" : "0"
        );

        if (data.user_id) {
            localStorage.setItem("user_id", data.user_id);
        }

        if (data.businesses) {
            localStorage.setItem("businesses", JSON.stringify(data.businesses));
        }

        window.location.href = "client-dashboard.html";
    } catch (err) {
        console.error("Login error:", err);
        alert("Unable to login. Please try again.");
    }
}
</script>

</body>
</html>
